version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      include: scope
    groups:
      pi:
        patterns:
          - '@earendil-works/pi-*'
      release-tooling:
        patterns:
          - '@semantic-release/*'
          - 'semantic-release'
      repo-tooling:
        patterns:
          - '@commitlint/*'
          - '@types/node'
          - 'prettier'
          - 'typescript'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions:
        patterns:
          - '*'
